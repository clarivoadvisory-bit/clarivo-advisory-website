kind = "web"
previewPath = "/"
title = "Clarivo Advisory"
version = "1.0.0"
id = "artifacts/clarivo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19334

[services.development]
run = "pnpm --filter @workspace/clarivo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clarivo", "run", "build" ]
publicDir = "artifacts/clarivo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19334"
BASE_PATH = "/"
